name: Octave Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GNU Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y octave

      - name: Run QEC test suite
        run: octave --no-gui tests/run_all_tests.m
